name: Deploy Preview to GitHub Pages

on:
  push:
    branches: [fix/mrkraken-starstrings-url]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: site

      - name: Checkout preview branch
        uses: actions/checkout@v4
        with:
          ref: fix/mrkraken-starstrings-url
          path: preview-src

      - name: Assemble site with preview
        run: |
          mkdir -p site/preview
          cp -r preview-src/* site/preview/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
